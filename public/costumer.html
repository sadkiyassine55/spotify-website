<!-- public/costumer.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotifyHub</title>

  <!-- نفس style.css، أما باش نعملولو rules خاصة بالcustomer-page -->
  <link rel="stylesheet" href="/style.css" />
</head>

<body class="customer-page">
  <div class="container">
    <h1>Redeem your Key</h1>

    <form id="redeemForm">
      <input
        type="text"
        id="key"
        placeholder="ProductHub-XXXX-XXXX"
        required
      />

      <input
        type="email"
        id="email"
        placeholder="your@email.com"
        required
      />

      <button type="submit">Redeem</button>
    </form>

    <p id="msg"></p>
  </div>

  <script src="/costumer.js"></script>
</body>
</html>
