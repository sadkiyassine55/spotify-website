<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotifyHub</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="customer-page">

  <div class="customer-card">
    <h1>Spotify Gold</h1>
    <p class="subtitle">Premium Upgrade</p>

    <form id="redeemForm">
      <label>Upgrade Key</label>
      <input type="text" id="key" placeholder="ProductHub-XXXX-XXXX" required />

      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" required />

      <button type="submit">Upgrade Now</button>
    </form>

    <p id="msg"></p>
  </div>

  <script src="/costumer.js"></script>
</body>
</html>
