<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotifyHub · Admin Panel</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <h2>SpotifyHub</h2>
        <span>Admin Panel</span>
      </div>

      <nav class="nav" aria-label="Primary">
        <a href="#" class="nav-link active" data-section="dashboard">
          <i class="fas fa-th-large"></i>
          <span>Dashboard</span>
        </a>

        <a href="#" class="nav-link" data-section="generate">
          <i class="fas fa-plus-circle"></i>
          <span>Generate Keys</span>
        </a>

        <a href="#" class="nav-link" data-section="stock">
          <i class="fas fa-box-open"></i>
          <span>Manage Stock</span>
        </a>

        <a href="#" class="nav-link" data-section="unbind">
          <i class="fas fa-random"></i>
          <span>Unbind Requests</span>
        </a>

        <a href="#" class="nav-link" data-section="allkeys">
          <i class="fas fa-lock"></i>
          <span>All Keys</span>
        </a>
      </nav>

      <div class="bottom-nav">
        <a href="#"><i class="fas fa-cog"></i><span>Settings</span></a>
        <a href="#"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
      </div>
    </aside>

    <!-- Main -->
    <section class="content-area">
      <main class="main-content" id="mainContent"></main>
    </section>
  </div>

<script src="./script.js"></script>
</body>
</html>
